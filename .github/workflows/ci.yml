name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: fmt check
        run: cargo fmt --all -- --check

      - name: clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: test
        run: cargo test --workspace

  vscode:
    name: VSCode (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: rust
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bin_dir: linux-x64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bin_dir: win32-x64

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Build release binary
        run: cargo build --release

      - name: Place binary for VSCode e2e tests (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p vscode/bin/${{ matrix.bin_dir }}
          cp target/release/loupe vscode/bin/${{ matrix.bin_dir }}/loupe

      - name: Place binary for VSCode e2e tests (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path vscode/bin/${{ matrix.bin_dir }}
          Copy-Item target/release/loupe.exe vscode/bin/${{ matrix.bin_dir }}/loupe.exe

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: vscode/package-lock.json

      - name: npm ci
        working-directory: vscode
        run: npm ci

      - name: typecheck
        working-directory: vscode
        run: npm run typecheck

      - name: test (Linux, via xvfb)
        if: runner.os == 'Linux'
        working-directory: vscode
        run: xvfb-run -a npm test

      - name: test (Windows)
        if: runner.os == 'Windows'
        working-directory: vscode
        run: npm test
