# Package the VS Code extension as platform-specific .vsix files and attach them to the GitHub
# Release. cargo-dist (release.yml) builds the native binaries but does NOT make vsix files, so this
# runs afterwards: it downloads each platform's binary from the just-published Release, drops it into
# the extension's bin/<os>-<arch>/ folder (where config.ts#resolveBinary looks), and runs vsce.
#
# This is intentionally a separate workflow from release.yml, which `dist init` owns and regenerates.
name: VS Code extension

on:
  # `release: published` cannot be used here: cargo-dist creates the Release with GITHUB_TOKEN,
  # and GitHub Actions does not cascade workflow triggers for GITHUB_TOKEN-created events.
  # `workflow_run` fires after the upstream workflow itself, regardless of how that workflow was
  # started, so it correctly catches releases created by cargo-dist.
  workflow_run:
    workflows: ["Release"]
    types: [completed]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build vsix files for (e.g. v0.1.0)"
        required: true

permissions:
  contents: write

jobs:
  vsix:
    # For workflow_run: only proceed when the upstream Release workflow succeeded.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # code_target == bin/<os>-<arch> dir the extension expects (config.ts#bundledBinaryRelPath)
          - { code_target: linux-x64,    rust: x86_64-unknown-linux-gnu,  archive: tar.xz, bin: loupe }
          - { code_target: linux-arm64,  rust: aarch64-unknown-linux-gnu, archive: tar.xz, bin: loupe }
          - { code_target: darwin-x64,   rust: x86_64-apple-darwin,       archive: tar.xz, bin: loupe }
          - { code_target: darwin-arm64, rust: aarch64-apple-darwin,      archive: tar.xz, bin: loupe }
          - { code_target: win32-x64,    rust: x86_64-pc-windows-msvc,    archive: zip,    bin: loupe.exe }
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            # workflow_run: head_branch is the git tag that triggered the Release workflow (e.g. v0.1.0)
            echo "tag=${{ github.event.workflow_run.head_branch }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download the native binary from the Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="${{ steps.tag.outputs.tag }}"
          ASSET="loupe-${{ matrix.rust }}.${{ matrix.archive }}"
          gh release download "$TAG" --repo "$GITHUB_REPOSITORY" --pattern "$ASSET"
          DEST="vscode/bin/${{ matrix.code_target }}"
          mkdir -p "$DEST"
          if [ "${{ matrix.archive }}" = "zip" ]; then
            # Try root-level first (cargo-dist >=0.20 flat layout), then subdir layout
            unzip -j "$ASSET" "${{ matrix.bin }}" -d "$DEST" 2>/dev/null || \
            unzip -j "$ASSET" "*/${{ matrix.bin }}" -d "$DEST"
          else
            tar -xf "$ASSET" --strip-components=1 -C "$DEST" --wildcards "*/${{ matrix.bin }}"
          fi
          chmod +x "$DEST/${{ matrix.bin }}" || true
          ls -l "$DEST"

      - name: Package vsix
        working-directory: vscode
        run: |
          set -euo pipefail
          cp ../README.md ../LICENSE .          # vsce reads these from the package dir
          npm ci
          npm run build
          npx --yes @vscode/vsce package \
            --target "${{ matrix.code_target }}" \
            -o "loupe-${{ matrix.code_target }}-${{ steps.tag.outputs.tag }}.vsix"

      - name: Attach vsix to the Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ steps.tag.outputs.tag }}" \
            "vscode/loupe-${{ matrix.code_target }}-${{ steps.tag.outputs.tag }}.vsix" \
            --repo "$GITHUB_REPOSITORY" --clobber

  publish:
    needs: vsix
    if: ${{ needs.vsix.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.event.workflow_run.head_branch }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download platform vsix files from the Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p vsix
          gh release download "${{ steps.tag.outputs.tag }}" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern "loupe-*-${{ steps.tag.outputs.tag }}.vsix" \
            --dir vsix
          ls -l vsix

      - name: Publish to VS Code Marketplace
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          set -euo pipefail
          npx --yes @vscode/vsce publish \
            --packagePath vsix/*.vsix \
            --skip-duplicate
